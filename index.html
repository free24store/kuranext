<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KuraNext — ログイン</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="app.js" defer></script>
</head>
<body>
<div class="login-page">
  <div class="login-card">
    <div class="login-logo">
      <div class="mark">Kura<span>Next</span></div>
      <p>工事写真管理SaaS</p>
    </div>
    <div id="errMsg" style="background:#fdecea;color:var(--ng);padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:16px;display:none;"></div>
    <form id="loginForm">
      <div class="form-group">
        <label class="form-label">メールアドレス</label>
        <input id="email" type="email" class="form-control" placeholder="your@email.com" required autocomplete="email">
      </div>
      <div class="form-group">
        <label class="form-label">パスワード</label>
        <input id="password" type="password" class="form-control" placeholder="••••••••" required autocomplete="current-password">
      </div>
      <button type="submit" class="btn btn-primary" id="loginBtn" style="width:100%;justify-content:center;padding:12px;">ログイン</button>
    </form>
    <div style="margin-top:20px;padding-top:16px;border-top:1px solid var(--paper3);text-align:center;">
      <p style="font-size:12px;color:var(--ink3);margin-bottom:10px;">パスワードをお忘れの方</p>
      <button id="resetBtn" class="btn btn-secondary" style="width:100%;justify-content:center;font-size:12px;">パスワードリセットメールを送る</button>
    </div>
  </div>
</div>
<script>
(async function() {
  // Supabaseクライアント取得（app.jsで定義済みのsbを使用）
  // 既ログイン済みチェック
  const { data } = await sb.auth.getSession();
  if (data.session) {
    const { data: profile } = await sb.from('profiles').select('role').eq('id', data.session.user.id).single();
    if (profile) { redirectByRole(profile.role); return; }
  }

  document.getElementById('loginForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    const btn = document.getElementById('loginBtn');
    btn.disabled = true;
    btn.textContent = 'ログイン中...';
    document.getElementById('errMsg').style.display = 'none';

    const email = document.getElementById('email').value;
    const pw = document.getElementById('password').value;
    const { data, error } = await sb.auth.signInWithPassword({ email: email, password: pw });

    if (error) {
      document.getElementById('errMsg').textContent = 'メールアドレスまたはパスワードが違います';
      document.getElementById('errMsg').style.display = 'block';
      btn.disabled = false;
      btn.textContent = 'ログイン';
      return;
    }

    const { data: profile } = await sb.from('profiles').select('role').eq('id', data.user.id).single();
    if (!profile) {
      document.getElementById('errMsg').textContent = 'アカウントの設定が完了していません。管理者にお問い合わせください。';
      document.getElementById('errMsg').style.display = 'block';
      btn.disabled = false;
      btn.textContent = 'ログイン';
      await sb.auth.signOut();
      return;
    }
    redirectByRole(profile.role);
  });

  document.getElementById('resetBtn').addEventListener('click', async function() {
    const email = document.getElementById('email').value;
    if (!email) {
      document.getElementById('errMsg').textContent = 'メールアドレスを入力してください';
      document.getElementById('errMsg').style.display = 'block';
      return;
    }
    await sb.auth.resetPasswordForEmail(email, { redirectTo: location.origin + '/index.html' });
    alert('パスワードリセットメールを送信しました');
  });
})();

function redirectByRole(role) {
  if (role === 'master') { location.href = 'master.html'; }
  else if (role === 'admin') { location.href = 'admin.html'; }
  else { location.href = 'staff.html'; }
}
</script>
</body>
</html>
