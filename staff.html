<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KuraNext — 現場スタッフ</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="app.js" defer></script>
</head>
<body>

<div class="loading-overlay" id="loadingOverlay">
  <div class="loading-spinner"></div>
  <div class="loading-text">読み込み中...</div>
</div>

<div class="app-layout" id="appLayout" style="display:none;">
<aside class="sidebar" id="sidebar">
  <div class="sidebar-logo"><div class="logo-mark">Kura<span>Next</span></div><div class="logo-sub">現場スタッフ</div></div>
  <div class="sidebar-role">STAFF</div>
  <nav>
    <div class="nav-item active" onclick="showPage('upload')" id="nav-upload"><span class="nav-icon">📷</span>写真アップロード</div>
    <div class="nav-item" onclick="showPage('myPhotos')" id="nav-myPhotos"><span class="nav-icon">🖼</span>自分の写真</div>
    <div class="nav-item" onclick="showPage('attendance')" id="nav-attendance"><span class="nav-icon">⏰</span>勤怠打刻</div>
    <div class="nav-item" onclick="showPage('schedule')" id="nav-schedule"><span class="nav-icon">📅</span>工程確認</div>
  </nav>
  <div class="sidebar-footer">
    <div class="user-info">
      <div class="user-avatar" id="avatarInitial">S</div>
      <div><div class="user-name" id="staffName">—</div><div class="user-email" id="staffEmail">—</div></div>
    </div>
    <button class="logout-btn" onclick="Auth.logout()">ログアウト</button>
  </div>
</aside>
<div class="sidebar-overlay" id="overlay" onclick="closeSidebar()"></div>

<div class="main-area">
<div class="topbar">
  <div style="display:flex;align-items:center;gap:12px;">
    <button class="menu-btn" onclick="openSidebar()">☰</button>
    <div class="topbar-title" id="pageTitle">写真アップロード</div>
  </div>
  <div class="topbar-right"><div class="ai-badge"><div class="dot"></div>AI仕分け ON</div></div>
</div>
<div class="content">

<!-- 写真アップロード -->
<div class="page-section active" id="page-upload">
  <div class="card" style="margin-bottom:16px;"><div class="card-body">
    <div class="form-group" style="margin-bottom:0;">
      <label class="form-label">工事現場を選択</label>
      <select class="form-control" id="uploadProject"><option value="">— 現場を選んでください —</option></select>
    </div>
  </div></div>
  <div class="card"><div class="card-header"><h2>📷 写真アップロード</h2><div style="font-size:12px;color:var(--ink3);">AIが自動で工種タグを付けます</div></div>
  <div class="card-body">
    <div class="upload-zone" id="dropZone" onclick="document.getElementById('fileInput').click()" ondragover="ev(event,true)" ondragleave="ev(event,false)" ondrop="drop(event)">
      <div class="upload-icon">📂</div>
      <p><strong>タップして写真を選択</strong><br>またはドラッグ＆ドロップ</p>
      <p style="font-size:11px;margin-top:6px;">JPG・PNG・HEIC対応（複数枚OK）</p>
    </div>
    <input type="file" id="fileInput" multiple accept="image/*" style="display:none" onchange="handleFiles(event.target.files)">
    <div id="uploadQueue" style="margin-top:14px;"></div>
  </div></div>
</div>

<!-- 自分の写真 -->
<div class="page-section" id="page-myPhotos">
  <div style="display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;align-items:center;">
    <select class="form-control" id="filterProject" onchange="renderMyPhotos()" style="width:180px;"><option value="">すべての現場</option></select>
    <select class="form-control" id="filterStatus" onchange="renderMyPhotos()" style="width:120px;"><option value="">すべての状態</option><option value="ok">✓ OK</option><option value="check">⚠ 要確認</option><option value="ng">✕ NG</option></select>
    <div id="photoCount" style="margin-left:auto;font-size:13px;color:var(--ink3);"></div>
  </div>
  <div id="photoGrid" class="photo-grid"></div>
  <div id="emptyPhotos" class="empty-state" style="display:none;"><div class="empty-icon">📭</div><p>写真がありません</p></div>
</div>

<!-- 勤怠打刻 -->
<div class="page-section" id="page-attendance">
  <div class="card" style="margin-bottom:16px;">
    <div class="card-header"><h2>⏰ 本日の打刻</h2><div id="nowClock" style="font-family:'DM Mono',monospace;font-size:20px;font-weight:700;color:var(--accent);"></div></div>
    <div class="card-body">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px;">
        <div style="text-align:center;background:var(--paper);border-radius:10px;padding:16px;"><div style="font-size:12px;color:var(--ink3);margin-bottom:4px;">出勤時刻</div><div id="todayIn" style="font-size:24px;font-weight:700;font-family:'DM Mono',monospace;color:var(--ok);">--:--</div></div>
        <div style="text-align:center;background:var(--paper);border-radius:10px;padding:16px;"><div style="font-size:12px;color:var(--ink3);margin-bottom:4px;">退勤時刻</div><div id="todayOut" style="font-size:24px;font-weight:700;font-family:'DM Mono',monospace;color:var(--ng);">--:--</div></div>
      </div>
      <div style="margin-bottom:12px;"><select class="form-control" id="attProject" style="max-width:280px;"><option value="">現場を選択（任意）</option></select></div>
      <div style="display:flex;gap:10px;"><button class="btn btn-primary" id="btnClockIn" onclick="clockIn()" style="flex:1;justify-content:center;padding:12px;">🟢 出勤</button><button class="btn btn-secondary" id="btnClockOut" onclick="clockOut()" style="flex:1;justify-content:center;padding:12px;" disabled>🔴 退勤</button></div>
    </div>
  </div>
  <div class="card"><div class="card-header"><h2>今月の勤怠</h2><div id="monthSummary" style="font-size:13px;color:var(--ink3);"></div></div>
  <div class="table-wrap"><table><thead><tr><th>日付</th><th>出勤</th><th>退勤</th><th>実働</th><th>現場</th></tr></thead><tbody id="attTable"></tbody></table></div></div>
</div>

<!-- 工程確認 -->
<div class="page-section" id="page-schedule">
  <div class="card"><div class="card-header"><h2>📅 担当工程</h2><select class="form-control" id="schedProjFilter" onchange="renderMySchedule()" style="width:180px;"><option value="">すべての現場</option></select></div>
  <div class="card-body" id="myScheduleList"></div></div>
</div>

</div></div></div>

<!-- 写真モーダル -->
<div class="modal-backdrop" id="photoModal"><div class="modal" style="max-width:540px;">
  <div class="modal-header"><h3 id="modalPhotoName">写真詳細</h3><button class="modal-close" onclick="closeModal('photoModal')">✕</button></div>
  <div class="modal-body"><div id="mdImgArea" style="margin-bottom:14px;"></div><div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;" id="modalTags"></div><div class="form-group"><label class="form-label">メモ</label><textarea id="modalNote" class="form-control" rows="3"></textarea></div><div style="font-size:12px;color:var(--ink3);" id="modalMeta"></div></div>
  <div class="modal-footer"><button class="btn btn-secondary btn-sm" onclick="closeModal('photoModal')">閉じる</button><button class="btn btn-primary btn-sm" onclick="saveNote()">保存</button></div>
</div></div>

<script>
let myProjects = [], todayRec = null, curPhId = null;
const pageTitle = {upload:'写真アップロード',myPhotos:'自分の写真',attendance:'勤怠打刻',schedule:'工程確認'};

document.addEventListener('DOMContentLoaded', async () => {
  const ok = await Auth.requireInit(['staff','admin']);
  if (!ok) return;

  const profile = Auth.profile();
  document.getElementById('staffName').textContent = profile.name;
  document.getElementById('staffEmail').textContent = Auth.session().user.email;
  document.getElementById('avatarInitial').textContent = profile.name.charAt(0);

  myProjects = await DB.getProjects(Auth.tenantId());
  populateProjectSelects();

  setInterval(() => {
    const el = document.getElementById('nowClock');
    if (el) el.textContent = new Date().toLocaleTimeString('ja-JP');
  }, 1000);

  document.getElementById('loadingOverlay').style.display = 'none';
  document.getElementById('appLayout').style.display = 'flex';
});

function populateProjectSelects() {
  const active = myProjects.filter(p => p.status === 'active');
  ['uploadProject','filterProject','attProject','schedProjFilter'].forEach(id => {
    const sel = document.getElementById(id); if (!sel) return;
    const cur = sel.value;
    const first = id === 'uploadProject' ? '<option value="">— 現場を選んでください —</option>' : id === 'attProject' ? '<option value="">現場を選択（任意）</option>' : '<option value="">すべての現場</option>';
    sel.innerHTML = first;
    (id === 'uploadProject' || id === 'attProject' ? active : myProjects).forEach(p => sel.innerHTML += `<option value="${p.id}">${p.name}</option>`);
    sel.value = cur;
  });
}

function showPage(name) {
  document.querySelectorAll('.page-section').forEach(e => e.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(e => e.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
  document.getElementById('nav-' + name).classList.add('active');
  document.getElementById('pageTitle').textContent = pageTitle[name] || '';
  if (name === 'myPhotos') renderMyPhotos();
  if (name === 'attendance') renderAttendance();
  if (name === 'schedule') renderMySchedule();
  closeSidebar();
}

// ── アップロード ──────────────────────────────
function ev(e, on) { e.preventDefault(); document.getElementById('dropZone').classList.toggle('drag', on); }
function drop(e) { e.preventDefault(); document.getElementById('dropZone').classList.remove('drag'); handleFiles(e.dataTransfer.files); }

async function handleFiles(files) {
  const pid = document.getElementById('uploadProject').value;
  if (!pid) { toast('現場を選択してください', 'error'); return; }

  for (const file of Array.from(files)) {
    const qid = crypto.randomUUID();
    addQItem(qid, file.name);
    try {
      updateQItem(qid, '🤖', 'AI分析中...');
      // AIタグ付け
      const aiResult = await AI.analyzePhoto(file);
      updateQItem(qid, '☁️', 'Storageにアップロード中...');
      // Supabase Storageにアップロード
      const storagePath = await Storage.uploadPhoto(Auth.tenantId(), file);
      // DBに保存
      await DB.insertPhoto({
        tenant_id: Auth.tenantId(),
        project_id: pid,
        uploaded_by: Auth.userId(),
        filename: file.name,
        storage_path: storagePath,
        ai_tags: aiResult.tags || [],
        status: aiResult.status || 'ok',
        note: aiResult.note || ''
      });
      // 写真数インクリメント
      const proj = myProjects.find(p => p.id === pid);
      await DB.upsertProject({ ...proj, photo_count: (proj.photo_count || 0) + 1 });

      updateQItem(qid, '🟢', `✓ ${(aiResult.tags || []).join(', ')}`);
    } catch (err) {
      updateQItem(qid, '🔴', `エラー: ${err.message}`);
    }
  }
}

function addQItem(id, name) {
  const d = document.createElement('div');
  d.id = 'qi-' + id;
  d.style.cssText = 'border:1px solid var(--paper3);border-radius:8px;padding:10px 14px;margin-bottom:8px;background:var(--paper);';
  d.innerHTML = `<div style="display:flex;align-items:center;gap:10px;"><div id="qi-i-${id}" style="font-size:18px;">⏳</div><div style="flex:1;min-width:0;"><div style="font-size:12px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${name}</div><div id="qi-s-${id}" style="font-size:11px;color:var(--ink3);">待機中...</div></div></div>`;
  document.getElementById('uploadQueue').prepend(d);
}
function updateQItem(id, icon, text) {
  const i = document.getElementById('qi-i-' + id); const s = document.getElementById('qi-s-' + id);
  if (i) i.textContent = icon; if (s) s.textContent = text;
}

// ── 写真一覧 ─────────────────────────────────
async function renderMyPhotos() {
  const fp = document.getElementById('filterProject').value;
  const fs = document.getElementById('filterStatus').value;
  const photos = await DB.getPhotos(Auth.tenantId(), { uploadedBy: Auth.userId(), projectId: fp || undefined, status: fs || undefined });
  document.getElementById('photoCount').textContent = photos.length + ' 枚';
  const grid = document.getElementById('photoGrid'), empty = document.getElementById('emptyPhotos');
  if (!photos.length) { grid.innerHTML = ''; empty.style.display = 'block'; return; }
  empty.style.display = 'none';

  // サムネURL取得
  const items = await Promise.all(photos.map(async ph => {
    let url = null;
    if (ph.storage_path) url = await Storage.getSignedUrl(ph.storage_path, 3600);
    return { ...ph, url };
  }));

  grid.innerHTML = items.map(ph => `
    <div class="photo-card" onclick="openPhotoModal('${ph.id}')">
      <div class="photo-thumb">${ph.url ? `<img src="${ph.url}" loading="lazy">` : '📷'}</div>
      <div class="photo-info">
        <div class="photo-name">${ph.filename}</div>
        <div class="photo-tags">${(ph.ai_tags || []).slice(0,3).map(t => `<span class="tag ai">${t}</span>`).join('')}</div>
        <div style="margin-top:4px;"><span class="badge badge-${ph.status}">${{ok:'✓ OK',check:'⚠ 要確認',ng:'✕ NG'}[ph.status]}</span></div>
      </div>
    </div>`).join('');
}

// ── 勤怠 ─────────────────────────────────────
async function renderAttendance() {
  populateProjectSelects();
  todayRec = await DB.getTodayAttendance(Auth.userId());
  refreshButtons();
  const today = new Date();
  const month = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}`;
  const recs = await DB.getAttendance(Auth.tenantId(), { userId: Auth.userId(), month });
  let totalH = 0;
  document.getElementById('attTable').innerHTML = recs.map(r => {
    const h = calcWorkHours(r.clock_in, r.clock_out, r.break_min);
    totalH += h;
    const pn = myProjects.find(p => p.id === r.project_id)?.name || '—';
    return `<tr><td>${formatDate(r.date)}</td><td style="font-family:'DM Mono',monospace;color:var(--ok);">${r.clock_in||'—'}</td><td style="font-family:'DM Mono',monospace;color:var(--ng);">${r.clock_out||'—'}</td><td style="font-family:'DM Mono',monospace;">${r.clock_out?h.toFixed(1)+'h':'—'}</td><td style="font-size:12px;">${pn}</td></tr>`;
  }).join('') || '<tr><td colspan="5" style="text-align:center;color:var(--ink3);">打刻データなし</td></tr>';
  document.getElementById('monthSummary').textContent = `今月累計 ${totalH.toFixed(1)}h`;
}

function refreshButtons() {
  document.getElementById('todayIn').textContent = todayRec?.clock_in || '--:--';
  document.getElementById('todayOut').textContent = todayRec?.clock_out || '--:--';
  const bi = document.getElementById('btnClockIn'), bo = document.getElementById('btnClockOut');
  if (todayRec?.clock_in && !todayRec?.clock_out) { bi.disabled = true; bo.disabled = false; }
  else if (todayRec?.clock_out) { bi.disabled = true; bo.disabled = true; }
  else { bi.disabled = false; bo.disabled = true; }
}

async function clockIn() {
  const n = new Date();
  const t = `${String(n.getHours()).padStart(2,'0')}:${String(n.getMinutes()).padStart(2,'0')}`;
  todayRec = await DB.upsertAttendance({
    tenant_id: Auth.tenantId(), user_id: Auth.userId(),
    date: n.toISOString().slice(0,10), clock_in: t, clock_out: null,
    break_min: 60, project_id: document.getElementById('attProject').value || null, note: ''
  });
  refreshButtons(); renderAttendance(); toast('出勤打刻しました ✓');
}

async function clockOut() {
  if (!todayRec) return;
  const n = new Date();
  const t = `${String(n.getHours()).padStart(2,'0')}:${String(n.getMinutes()).padStart(2,'0')}`;
  todayRec = await DB.upsertAttendance({ ...todayRec, clock_out: t });
  refreshButtons(); renderAttendance(); toast('退勤打刻しました ✓');
}

// ── 工程確認 ─────────────────────────────────
async function renderMySchedule() {
  const fp = document.getElementById('schedProjFilter').value;
  let ss = await DB.getSchedules(Auth.tenantId(), fp || undefined);
  ss = ss.filter(s => (s.assignees || []).includes(Auth.userId()));
  const sl = {done:'完了',active:'進行中',pending:'予定'};
  document.getElementById('myScheduleList').innerHTML = ss.length === 0
    ? '<div style="color:var(--ink3);font-size:13px;">担当工程がありません</div>'
    : ss.map(s => {
        const proj = myProjects.find(p => p.id === s.project_id);
        const st = new Date(s.start_date), en = new Date(s.end_date), td = new Date();
        const pct = Math.min(100, Math.max(0, (td - st) / (en - st) * 100)).toFixed(0);
        return `<div style="padding:14px 0;border-bottom:1px solid var(--paper2);">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;">
            <div><div style="font-weight:700;">${s.title}</div><div style="font-size:12px;color:var(--ink3);">${proj?.name||'—'}</div></div>
            <span class="badge badge-${s.status==='active'?'active':s.status==='done'?'done':'free'}">${sl[s.status]}</span>
          </div>
          <div style="font-size:12px;color:var(--ink3);margin-bottom:6px;">${formatDate(s.start_date)} 〜 ${formatDate(s.end_date)}</div>
          <div class="progress-bar"><div class="progress-fill" style="width:${pct}%;background:${s.color};"></div></div>
        </div>`;
      }).join('');
}

// ── 写真モーダル ──────────────────────────────
async function openPhotoModal(id) {
  const photos = await DB.getPhotos(Auth.tenantId(), { uploadedBy: Auth.userId() });
  const ph = photos.find(p => p.id === id); if (!ph) return;
  curPhId = id;
  let url = null; if (ph.storage_path) url = await Storage.getSignedUrl(ph.storage_path);
  document.getElementById('modalPhotoName').textContent = ph.filename;
  document.getElementById('mdImgArea').innerHTML = url ? `<img src="${url}" style="width:100%;max-height:260px;object-fit:contain;border-radius:8px;background:var(--paper2);">` : `<div style="height:150px;background:var(--paper2);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:48px;">📷</div>`;
  document.getElementById('modalTags').innerHTML = (ph.ai_tags||[]).map(t=>`<span class="tag ai">${t}</span>`).join('') + `<span class="badge badge-${ph.status}" style="margin-left:4px;">${{ok:'✓ OK',check:'⚠ 要確認',ng:'✕ NG'}[ph.status]}</span>`;
  document.getElementById('modalNote').value = ph.note || '';
  document.getElementById('modalMeta').textContent = `📅 ${new Date(ph.created_at).toLocaleString('ja-JP')}`;
  openModal('photoModal');
}
async function saveNote() {
  if (!curPhId) return;
  await DB.updatePhoto(curPhId, { note: document.getElementById('modalNote').value });
  toast('保存しました'); closeModal('photoModal'); renderMyPhotos();
}

function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }
function openSidebar() { document.getElementById('sidebar').classList.add('open'); document.getElementById('overlay').classList.add('open'); }
function closeSidebar() { document.getElementById('sidebar').classList.remove('open'); document.getElementById('overlay').classList.remove('open'); }
</script>
</body>
</html>
